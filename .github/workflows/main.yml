name: Supabase Keep Alive
on:
  schedule:
    # 05:00 UTC es exactamente las 00:00 (Medianoche) en Panamá (UTC-5)
    - cron: '0 5 * * *'
  workflow_dispatch: # Permite ejecución manual desde la pestaña Actions

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Send Traffic to PrestApp Database
        run: |
          curl -i -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/prestapp_data?select=*" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
